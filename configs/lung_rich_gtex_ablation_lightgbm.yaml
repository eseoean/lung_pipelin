inherits:
  - lung.yaml

stages:
  train_baseline:
    output_dir: outputs/model_runs/rich_gtex_ablation_lightgbm

train_baseline:
  split_types:
    - groupcv
    - randomcv
  conditions:
    - no_gtex
    - pair_only
    - pair_plus_top4
    - full_gtex
  models:
    - lightgbm
  lightgbm:
    n_estimators: 300
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
