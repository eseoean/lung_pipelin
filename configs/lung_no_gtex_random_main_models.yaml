inherits:
  - lung.yaml

stages:
  train_baseline:
    output_dir: outputs/model_runs/no_gtex_random_main_models

train_baseline:
  split_types:
    - randomcv
  conditions:
    - no_gtex
  models:
    - xgboost
    - lightgbm
    - tabnet
    - residual_mlp
  xgboost:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    reg_lambda: 1.0
    random_state: 42
    n_jobs: 4
  lightgbm:
    n_estimators: 300
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
  residual_mlp:
    hidden_dim: 128
    num_blocks: 3
    dropout: 0.1
    learning_rate: 0.001
    weight_decay: 0.0001
    batch_size: 512
    epochs: 20
    random_state: 42
    device: auto
  tabnet:
    n_d: 16
    n_a: 16
    n_steps: 4
    gamma: 1.3
    lambda_sparse: 0.0001
    learning_rate: 0.02
    batch_size: 1024
    virtual_batch_size: 128
    max_epochs: 20
    patience: 5
    random_state: 42
    device: auto
