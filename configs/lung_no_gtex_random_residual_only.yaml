inherits:
  - lung.yaml

stages:
  train_baseline:
    output_dir: outputs/model_runs/no_gtex_random_residual_only

train_baseline:
  split_types:
    - randomcv
  conditions:
    - no_gtex
  models:
    - residual_mlp
  residual_mlp:
    hidden_dim: 128
    num_blocks: 3
    dropout: 0.1
    learning_rate: 0.001
    weight_decay: 0.0001
    batch_size: 512
    epochs: 18
    random_state: 42
    device: cpu
