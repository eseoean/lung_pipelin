inherits:
  - base.yaml
  - datasets.yaml

study:
  name: lung_cancer_drug_response
  histologies:
    - LUAD
    - LUSC
    - NSCLC
  label_source: GDSC
  auxiliary_label_source: PRISM
  random_seed: 42
  n_splits: 3
  group_key: canonical_drug_id

standardization:
  cancer_codes:
    - LUAD
    - LUSC
  binary_quantile: 0.3
  cache_dir: .cache/standardize_tables
  sources:
    gdsc_dataset: s3://say2-4team/Lung_raw/GDSC/GDSC2-dataset.csv
    gdsc_compounds: s3://say2-4team/Lung_raw/GDSC/Compounds-annotation.csv
    depmap_model: s3://say2-4team/Lung_raw/depmap/Model.csv
    depmap_crispr: s3://say2-4team/Lung_raw/depmap/CRISPRGeneDependency.csv
    lincs_pert_info_primary: s3://say2-4team/Lung_raw/LInc1000(세포주)/GSE70138_Broad_LINCS_pert_info.txt.gz
    lincs_pert_info_secondary: s3://say2-4team/Lung_raw/lincs/GSE92742_Broad_LINCS_pert_info.txt.gz
    drugbank_master: s3://say2-4team/20260409_eseo/data/drugbank/drugbank_drug_master_basic_20260406.parquet
    drugbank_synonym: s3://say2-4team/20260409_eseo/data/drugbank/drugbank_synonym_table_basic_20260406.parquet
    chembl_master: s3://say2-4team/20260409_eseo/data/chembl/chembl_compound_master_basic_20260406.parquet
    exact_drug_catalog: s3://say2-4team/20260409_eseo/data/drug_features_catalog.parquet
    exact_target_mapping: s3://say2-4team/20260409_eseo/data/drug_target_mapping.parquet
  crispr_chunksize: 32

  optional_sources:
    prism_response: s3://say2-4team/Lung_raw/additional_sources/prism/
    cosmic_lung: s3://say2-4team/Lung_raw/additional_sources/cosmic_lung/

disease_context:
  cache_dir: .cache/disease_context
  expression_value_column: tpm_unstranded
  gene_types:
    - protein_coding
  minimum_pathway_genes: 10
  patient_feature_top_k_hallmark: 25
  max_files_per_cohort:
  sources:
    tcga_luad_counts: s3://say2-4team/Lung_raw/tcga_luad_rna_star_counts/
    tcga_lusc_counts: s3://say2-4team/Lung_raw/tcga_lusc_rna_star_counts/
    tcga_luad_manifest: s3://say2-4team/Lung_raw/manifests/luad_manifest_rna_only.tsv
    tcga_lusc_manifest: s3://say2-4team/Lung_raw/manifests/lusc_manifest_rna_only.tsv
    msigdb_hallmark: s3://say2-4team/Lung_raw/msigdb/h.all.v2026.1.Hs.symbols.gmt
    msigdb_oncogenic: s3://say2-4team/Lung_raw/msigdb/c6.all.v2026.1.Hs.symbols.gmt
    gtex_lung_tpm: s3://say2-4team/Lung_raw/gtex/v8/rna-seq/tpms-by-tissue/gene_tpm_2017-06-05_v8_lung.gct.gz
    gtex_sample_attributes: s3://say2-4team/Lung_raw/gtex/GTEx_Analysis_v8_Annotations_SampleAttributesDS.txt
    gtex_subject_phenotypes: s3://say2-4team/Lung_raw/gtex/GTEx_Analysis_v8_Annotations_SubjectPhenotypesDS.txt

model_inputs:
  top_signature_genes_per_cohort: 12
  top_pathways_per_collection: 8
  filter_to_depmap_mapped: false
  include_label_aggregate_features: false
  include_sample_crispr_features: true
  include_drug_structure_features: true
  drug_fingerprint_radius: 2
  drug_fingerprint_nbits: 2048

train_baseline:
  mode: quick_gtex_groupcv_ablation
  target_column: label_regression
  group_column: canonical_drug_id
  n_splits: 3
  random_state: 42
  models:
    - random_forest
    - flat_mlp
  conditions:
    - no_gtex
    - sample_summary_only
    - sample_nonconstant
    - sample_only
    - pair_only
    - pair_plus_summary
    - pair_plus_top4
    - pair_plus_nonconstant
    - full_gtex
  random_forest:
    n_estimators: 240
    max_depth:
    min_samples_leaf: 2
    max_features: sqrt
    n_jobs: -1
    random_state: 42
  flat_mlp:
    hidden_dims:
      - 128
      - 64
    dropout: 0.1
    learning_rate: 0.001
    weight_decay: 0.0001
    batch_size: 512
    epochs: 18
    random_state: 42
    device: auto

deliverables:
  masters:
    - drug_master
    - cell_line_master
  disease_context:
    - luad_signature
    - lusc_signature
    - disease_pathway_activity
  model_inputs:
    - sample_features
    - drug_features
    - pair_features
    - train_table
    - labels_y

extensions:
  enable_patient_inference: true
  enable_rerank_outputs: true
