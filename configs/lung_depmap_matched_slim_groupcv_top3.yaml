inherits:
  - lung_depmap_matched_slim.yaml

stages:
  train_baseline:
    output_dir: outputs/model_runs/lung_depmap_matched_slim_groupcv_top3

train_baseline:
  input_dir: data/processed/model_inputs_depmap_matched_slim
  split_types:
    - groupcv
  conditions:
    - no_gtex
  models:
    - lightgbm
    - xgboost
    - residual_mlp
  residual_mlp:
    hidden_dim: 128
    num_blocks: 3
    dropout: 0.1
    learning_rate: 0.001
    weight_decay: 0.0001
    batch_size: 1024
    epochs: 10
    random_state: 42
    device: cpu
