inherits:
  - lung.yaml

stages:
  train_baseline:
    output_dir: outputs/model_runs/no_gtex_random_tabnet_only

train_baseline:
  split_types:
    - randomcv
  conditions:
    - no_gtex
  models:
    - tabnet
  tabnet:
    n_d: 8
    n_a: 8
    n_steps: 3
    gamma: 1.2
    lambda_sparse: 0.0001
    learning_rate: 0.02
    batch_size: 2048
    virtual_batch_size: 256
    max_epochs: 8
    patience: 3
    random_state: 42
    device: cpu
